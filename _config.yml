title: 까치집
tagline: 데이터로 짓는 집 이야기
description: >-
  매일 아파트 실거래가·시세 분석, 재건축 사실 데이터, 그리고 둥지의 일상.
  국토교통부 공개데이터 기반 기술통계 (투자 자문 아님).
url: "https://soroka-nest.github.io"
