theme: jekyll-theme-chirpy

lang: ko-KR
timezone: Asia/Seoul

title: 까치집
tagline: 데이터로 짓는 집 이야기
description: >-
  매일 부동산 실거래가·시세 분석과 재건축 사실 데이터, 그리고 둥지의 일상.
  국토교통부 공개데이터 기반 기술통계입니다 (투자 자문 아님).

url: "https://soroka-nest.github.io"
baseurl: ""

github:
  username: soroka-nest

social:
  name: 까치집
  email: ""
  links: []

avatar: /assets/img/avatar.png
social_preview_image: /assets/img/og.png

theme_mode: # light | dark | (empty = follow system + toggle)
toc: true
paginate: 8

comments:
  provider: giscus
  giscus:
    repo: soroka-nest/soroka-nest.github.io
    repo_id: R_kgDOSf3R9Q
    category: Announcements
    category_id: DIC_kwDOSf3R9c4C9QGj
    mapping: pathname
    strict: "0"
    input_position: bottom
    lang: ko
    reactions_enabled: "1"

# ── chirpy required (theme gems do NOT inherit _config.yml) ──────────────
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .gitattributes
  - _drafts
